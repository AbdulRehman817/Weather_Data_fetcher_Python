<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .weather-box {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            text-align: left;
        }

        .weather-box h3 {
            text-align: center;
            color: #1e3a8a;
        }

        .weather-box p {
            font-size: 18px;
            margin: 10px 0;
            background: #e0f2fe;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌦 Weather App</h2>

        <form method="POST">
            <input type="text" name="city" placeholder="Enter city" required>
            <button type="submit">Get Weather</button>
        </form>

        {% if weather %}
        <div class="weather-box">
            <h3>📍 Weather Result</h3>
            <p>🌡 Temperature: {{ weather.temperature_2m }}°C</p>
            <p>💧 Humidity: {{ weather.relative_humidity_2m }}%</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
